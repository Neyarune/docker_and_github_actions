name: Build, Scan and Push

on:
  push:
    branches: [ "main" ] # запускать при пуше в main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Токен создается сам внутри Action!

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/my-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/my-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Остановит сборку, если найдет критические уязвимости
          severity: 'CRITICAL,HIGH'

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/my-app:${{ github.sha }}
